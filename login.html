<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nexus Events</title>
    <link rel="stylesheet" href="css/base.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgb(90, 92, 106) 0%, rgb(32, 45, 58) 81.3%);
            font-family: system-ui, -apple-system, sans-serif;
            color: #fff;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        .auth-card h1 { margin-bottom: 10px; font-size: 28px; }
        .auth-card p { color: rgba(255,255,255,0.7); margin-bottom: 30px; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: rgba(255,255,255,0.8); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus { border-color: #ffd700; background: rgba(0,0,0,0.4); }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        
        .toggle-link {
            margin-top: 20px;
            color: #ffd700;
            font-size: 14px;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .error-msg { color: #ff4757; font-size: 14px; margin-bottom: 15px; display:none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card" id="loginCard">
            <h1>Welcome Back</h1>
            <p>Enter your details to access Nexus Events</p>
            <div class="error-msg" id="errorMsgLogin"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="logEmail" required placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="logPass" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
            <div class="toggle-link" onclick="toggleAuth()">Need an account? Sign Up</div>
        </div>

        <div class="auth-card" id="signupCard" style="display:none;">
            <h1>Create Account</h1>
            <p>Join the Nexus community</p>
            <div class="error-msg" id="errorMsgSignup"></div>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signName" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signEmail" required placeholder="name@domain.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signPass" required placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label>Select Role</label>
                    <select id="signRole">
                        <option value="user">Event Attendee (User)</option>
                        <option value="organizer">Event Organizer</option>
                    </select>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <div class="toggle-link" onclick="toggleAuth()">Already have an account? Login</div>
        </div>
    </div>

    <script type="module">
        import { Store } from './js/store.js';

        window.toggleAuth = () => {
            const login = document.getElementById('loginCard');
            const signup = document.getElementById('signupCard');
            if(login.style.display === 'none') {
                login.style.display = 'block';
                signup.style.display = 'none';
            } else {
                login.style.display = 'none';
                signup.style.display = 'block';
            }
        };

        const redirectUser = (role) => {
            if(role === 'admin') window.location.href = 'dashboard.html';
            else window.location.href = 'explore.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'Connecting...';
            const logE = document.getElementById('logEmail').value;
            const logP = document.getElementById('logPass').value;
            
            const res = await Store.login(logE, logP);
            if(res.success) {
                redirectUser(Store.state.user.role);
            } else {
                const err = document.getElementById('errorMsgLogin');
                err.innerText = res.message;
                err.style.display = 'block';
                btn.innerHTML = 'Login';
            }
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = 'Creating...';
            const n = document.getElementById('signName').value;
            const em = document.getElementById('signEmail').value;
            const p = document.getElementById('signPass').value;
            const r = document.getElementById('signRole').value;
            
            const res = await Store.signup(n, em, p, r);
            if(res.success) {
                redirectUser(Store.state.user.role);
            } else {
                const err = document.getElementById('errorMsgSignup');
                err.innerText = res.message;
                err.style.display = 'block';
                btn.innerHTML = 'Sign Up';
            }
        });
    </script>
</body>
</html>
