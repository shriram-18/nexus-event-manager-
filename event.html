<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details | Nexus</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Toastify for sleek notifs -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/components.css">

    <style>
        .event-layout {
            padding-top: 100px;
            padding-bottom: 60px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .event-hero {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .event-meta-bar {
            display: flex;
            gap: 32px;
            margin-bottom: 32px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
        }

        .meta-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .meta-block-title {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .meta-block-value {
            font-size: 1.15rem;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .host-profile {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0;
            padding: 24px;
        }

        .host-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            object-fit: cover;
            border: 2px solid var(--glass-border);
        }

        /* Registration Widget */
        .register-widget {
            position: sticky;
            top: 100px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .price-tag {
            font-family: var(--font-heading);
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #mapContainer {
            height: 280px;
            border-radius: 16px;
            margin-top: 24px;
            border: 1px solid var(--glass-border);
            z-index: 1; /* Keep leaflet beneath nav */
        }

        @media (max-width: 900px) {
            .event-layout {
                grid-template-columns: 1fr;
            }
            .register-widget {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="brand">
                <i class="fa-solid fa-layer-group brand-icon"></i> Nexus
            </a>
            <div class="nav-links">
                <a href="explore.html">Explore</a>
                <a href="dashboard.html">My Tickets</a>
                <a href="create.html" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.9rem;">Host Event</a>
            </div>
        </div>
    </nav>

    <main class="container event-layout" id="eventContent">
        <!-- Rendered via JS -->
        <p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px;">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading event data...
        </p>
    </main>

    <footer>
        <div class="container footer-content">
            <p><i class="fa-solid fa-layer-group" style="color:var(--primary)"></i> Nexus Events.</p>
        </div>
    </footer>

    <!-- Toastify & Leaflet -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- App Logic -->
    <script src="./js/app.js" type="module"></script>
    <script type="module">
        import { Store } from './js/store.js';

        document.addEventListener('DOMContentLoaded', async () => {
            await Store.init();
            
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');
            const container = document.getElementById('eventContent');

            if (!eventId) {
                showError(container); return;
            }

            let event = Store.getEventById(eventId);
            if (!event) {
                try {
                    const singleRes = await fetch(`${Store.API_URL}/events/${eventId}`, { headers: Store.headers });
                    if(singleRes.ok) {
                        event = await singleRes.json();
                    }
                } catch(e) {
                    console.error("Failed to fetch custom event:", e);
                }
            }

            if (!event) {
                showError(container); return;
            }

            const dateObj = new Date(event.date);
            const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            const timeStr = dateObj.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

            const isSoldOut = event.spotsFilled >= event.spotsTotal;
            const hasTicket = Store.state.myTickets.some(t => t.eventId === event.id);

            let quantitySelectorHtml = '';
            if (!isSoldOut && !hasTicket) {
                quantitySelectorHtml = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border);">
                        <span style="font-weight: 500;">Tickets</span>
                        <input type="number" id="ticketQty" value="1" min="1" max="${event.spotsTotal - event.spotsFilled}" style="width: 70px; padding: 6px; border-radius: 6px; border: 1px solid var(--glass-border); background: var(--bg-color-light); color: white; text-align: center; outline: none; font-family: var(--font-heading);">
                    </div>
                `;
            }

            let btnHtml = `<button id="bookBtn" class="btn btn-primary" style="width:100%; font-size:1.1rem; padding:16px;">Book Now <span id="totalPriceBtnDisplay" style="margin-left:8px;">${event.price > 0 ? '($' + event.price + ')' : '(Free)'}</span></button>`;
            
            if (event.status === 'pending') {
                btnHtml = `<div class="badge" style="width:100%; font-size: 1rem; text-align:center; padding:16px; border-color:#ffd700; color:#ffd700; background:rgba(255,215,0,0.1);"><i class="fa-solid fa-clock"></i> Pending Admin Approval</div>`;
                quantitySelectorHtml = ''; 
            } else if (hasTicket) {
                btnHtml = `<a href="dashboard.html" class="btn btn-outline" style="width:100%; border-color:var(--accent); color:var(--accent);"><i class="fa-solid fa-check"></i> Ticket Secured (View Dashboard)</a>`;
            } else if (isSoldOut) {
                btnHtml = `<button class="btn btn-outline" disabled style="width:100%; opacity:0.5; border-color:var(--danger); color:var(--danger);">Sold Out</button>`;
            }

            const formatPrice = event.price === 0 ? "Free" : "$" + event.price;
            const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${event.host}`;

            container.innerHTML = `
                <div class="event-main">
                    <div class="card-badges" style="position:relative; top:0; left:0; display:flex; gap:8px; margin-bottom:20px;">
                        <span class="badge" style="border-color:var(--primary); color:white; background:rgba(59,130,246,0.6);">${event.category}</span>
                        ${event.vibes.map(v => `<span class="badge">${v}</span>`).join('')}
                    </div>
                    
                    <h1 style="font-size: clamp(2.2rem, 5vw, 3.8rem); margin-bottom: 24px; line-height: 1.1;">${event.title}</h1>
                    
                    <img src="${event.image}" alt="${event.title}" class="event-hero">
                    
                    <div class="event-meta-bar">
                        <div class="meta-block">
                            <span class="meta-block-title">Date & Time</span>
                            <span class="meta-block-value"><i class="fa-regular fa-calendar" style="color:var(--primary); margin-right:10px;"></i>${dateStr}</span>
                            <span class="meta-block-value" style="color:var(--text-muted); font-size:1rem; margin-top:2px;">${timeStr}</span>
                        </div>
                        <div class="meta-block">
                            <span class="meta-block-title">Location</span>
                            <span class="meta-block-value"><i class="fa-solid fa-location-dot" style="color:var(--primary); margin-right:10px;"></i><span id="eventLocationText">${event.location}</span></span>
                            <span id="distanceDisplay" style="color:var(--accent); font-size: 0.9rem; margin-top: 4px; display:none;"><i class="fa-solid fa-route"></i> Calculating...</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 40px;">
                        <h3 style="margin-bottom: 16px; font-size: 1.5rem;">The Vibe</h3>
                        <p style="font-size: 1.15rem; line-height: 1.8; color: var(--text-main); font-weight: 300;">${event.description}</p>
                    </div>

                    <div class="glass-pane host-profile">
                        <img src="${avatarUrl}" alt="${event.host}" class="host-avatar">
                        <div>
                            <span style="color:var(--text-muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">Organized by</span>
                            <h4 style="margin:0; font-size:1.3rem;">${event.host}</h4>
                        </div>
                    </div>
                </div>

                <div class="event-sidebar">
                    <div class="glass-pane register-widget">
                        <div style="text-align:center;">
                            <div class="price-tag">${formatPrice}</div>
                            <p style="color:var(--text-muted); margin-top:8px; margin-bottom:24px;">Only ${event.spotsTotal - event.spotsFilled} spots remaining!</p>
                        </div>
                        
                        ${quantitySelectorHtml}
                        ${btnHtml}
                        
                        <div style="margin-top: 16px; display:flex; gap:12px;" id="bonusActions">
                            <button class="btn btn-outline" style="flex:1;" onclick="shareEvent()"><i class="fa-solid fa-share-nodes"></i> Share</button>
                            <button class="btn btn-outline" style="flex:1;" onclick="calendarExport()"><i class="fa-regular fa-calendar-plus"></i> Cal</button>
                        </div>
                    </div>

                    <!-- Map container -->
                    <div id="mapContainer"></div>
                </div>
            `;

            // Initialize Map
            let map;
            if (event.coordinates) {
                map = L.map('mapContainer').setView(event.coordinates, 15);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: 'Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);

                const customIcon = L.divIcon({
                    html: '<i class="fa-solid fa-location-dot" style="color: #3b82f6; font-size: 36px; filter: drop-shadow(0 0 10px rgba(59,130,246,0.9));"></i>',
                    className: '',
                    iconSize: [36, 36],
                    iconAnchor: [18, 36]
                });

                L.marker(event.coordinates, {icon: customIcon}).addTo(map)
                    .bindPopup(`<strong style="color:black;">${event.location}</strong>`)
                    .openPopup();

                // Geolocation tracker
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        const userLat = pos.coords.latitude;
                        const userLon = pos.coords.longitude;
                        
                        // Add pulsing dot
                        const userIcon = L.divIcon({
                            html: '<div style="width: 16px; height: 16px; background: #10b981; border-radius: 50%; box-shadow: 0 0 15px #10b981; animation: pulse 1.5s infinite;"></div><style>@keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }</style>',
                            className: '',
                            iconSize: [16, 16],
                            iconAnchor: [8, 8]
                        });
                        
                        L.marker([userLat, userLon], {icon: userIcon}).addTo(map)
                            .bindPopup(`<strong style="color:black;">You are here</strong>`);
                            
                        map.fitBounds([
                            [userLat, userLon],
                            event.coordinates
                        ], { padding: [50, 50] });

                        // Calculate distance (Haversine formula)
                        const R = 3958.8; // Radius in miles
                        const dLat = (event.coordinates[0] - userLat) * Math.PI / 180;
                        const dLon = (event.coordinates[1] - userLon) * Math.PI / 180;
                        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                            Math.cos(userLat * Math.PI / 180) * Math.cos(event.coordinates[0] * Math.PI / 180) * 
                            Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
                        const d = R * c;

                        const distDisplay = document.getElementById('distanceDisplay');
                        if (distDisplay) {
                            distDisplay.innerHTML = `<i class="fa-solid fa-route" style="margin-right:6px;"></i>${d.toFixed(1)} miles away`;
                            distDisplay.style.display = 'block';
                        }
                    }, (err) => {
                        console.warn('Geolocation denied or failed:', err);
                    });
                }
            }

            // Booking Logic
            const bookBtn = document.getElementById('bookBtn');
            const qtyInput = document.getElementById('ticketQty');
            const totalDisplay = document.getElementById('totalPriceBtnDisplay');

            if (qtyInput && totalDisplay) {
                qtyInput.addEventListener('input', (e) => {
                    let qty = parseInt(e.target.value) || 1;
                    const maxQty = event.spotsTotal - event.spotsFilled;
                    if(qty > maxQty) { qty = maxQty; e.target.value = qty; }
                    if(qty < 1) { qty = 1; e.target.value = 1; }
                    
                    const total = qty * event.price;
                    totalDisplay.innerText = total > 0 ? '($' + total + ')' : '(Free)';
                });
            }

            if (bookBtn && !hasTicket && !isSoldOut) {
                bookBtn.addEventListener('click', async () => {
                    bookBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing...';
                    bookBtn.disabled = true;
                    
                    const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                    const res = await Store.bookTicket(event.id, qty);
                    
                    if (res.success) {
                        Toastify({
                            text: "✅ Ticket Secured Successfully! View Dashboard.",
                            duration: 3000,
                            close: true,
                            gravity: "top", 
                            position: "center",
                            style: { background: "linear-gradient(135deg, rgba(16, 185, 129, 0.9), rgba(5, 150, 105, 0.9))", borderRadius: "12px", backdropFilter: "blur(10px)" }
                        }).showToast();
                        
                        bookBtn.outerHTML = `<a href="dashboard.html" class="btn btn-outline" style="width:100%; border-color:var(--accent); color:var(--accent);"><i class="fa-solid fa-check"></i> Ticket Secured</a>`;
                        if(qtyInput) qtyInput.parentElement.style.display = 'none';
                    } else {
                        bookBtn.innerHTML = 'Book Ticket Now';
                        bookBtn.disabled = false;
                        Toastify({
                            text: "❌ " + res.message,
                            duration: 3000,
                            close: true,
                            gravity: "top", 
                            position: "center",
                            style: { background: "linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(220, 38, 38, 0.9))", borderRadius: "12px", backdropFilter: "blur(10px)" }
                        }).showToast();
                        
                        // If it's a login requirement error, redirect them
                        if(res.message.includes('register or login')) {
                            setTimeout(() => window.location.href = 'login.html', 1500);
                        }
                    }
                });
            }

            // Bind Global Action Handlers
            window.shareEvent = () => {
                Toastify({ text: "Link copied to clipboard!", duration: 2000, style: { background: "var(--glass-bg)", border: "1px solid var(--glass-border)", color: "white", borderRadius: '8px' } }).showToast();
            };
            window.calendarExport = () => {
                Toastify({ text: "Downloaded event.ics", duration: 2000, style: { background: "var(--glass-bg)", border: "1px solid var(--glass-border)", color: "white", borderRadius: '8px' } }).showToast();
            };
        });

        function showError(container) {
            const urlParams = new URLSearchParams(window.location.search);
            const badId = urlParams.get('id') || 'Unknown ID';
            const fullHref = window.location.href; // diagnostic
            container.innerHTML = `
                <div class="glass-pane" style="grid-column: 1/-1; text-align:center; padding: 80px 20px;">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: var(--danger); margin-bottom: 20px;"></i>
                    <h2>Event Not Found</h2>
                    <p style="color:var(--text-muted);">The event you are looking for might have been cancelled or removed.<br><br><span style="font-size:0.8rem; opacity:0.6;">(Debug ID: ${badId})</span><br><span style="font-size:0.7rem; opacity:0.4; word-break:break-all;">Full URL: ${fullHref}</span></p>
                    <a href="explore.html" class="btn btn-primary" style="margin-top:24px;">Back to Explore</a>
                </div>`;
        }
    </script>
</body>
</html>
